name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses-dev libfreetype-dev libvulkan-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install freetype

      - name: Check formatting
        run: zig fmt --check src/

      - name: Build
        run: zig build

      - name: Test
        run: zig build test
