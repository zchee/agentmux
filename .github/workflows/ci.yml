name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libncurses-dev libfreetype-dev libvulkan-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install freetype

      - name: Check formatting
        run: zig fmt --check src/

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Linux std.Io runtime smoke
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          socket_name="ci-smoke-${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-0}"
          trap './zig-out/bin/zmux -L "$socket_name" kill-server >/dev/null 2>&1 || true' EXIT

          ./zig-out/bin/zmux -L "$socket_name" start-server
          ./zig-out/bin/zmux -L "$socket_name" new-session -d -s demo
          ./zig-out/bin/zmux -L "$socket_name" list-sessions | tee /tmp/zmux-list-sessions.txt
          grep -q '^demo:' /tmp/zmux-list-sessions.txt
          ./zig-out/bin/zmux -L "$socket_name" kill-server
